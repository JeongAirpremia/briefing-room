<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>브리핑실 이용 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0B0D11;
  --surface:#14171E;
  --surface-2:#1B1F28;
  --line:#262B36;
  --text:#F2F4F8;
  --text-dim:#8C93A3;
  --accent:#3B82F6;
  --busy:#FF4D4F;
  --busy-soft:rgba(255,77,79,.12);
  --free:#22C55E;
  --radius:22px;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  user-select:none;
  font-feature-settings:"tnum";
}

/* ── Header ── */
header{
  padding:26px 42px 18px;display:flex;align-items:flex-end;justify-content:space-between;
  border-bottom:1px solid var(--line);
}
.title-row{display:flex;align-items:center;gap:16px;}
.logo{height:19px;width:auto;object-fit:contain;}
.divider{width:1px;height:24px;background:var(--line);}
.h-left h1{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.h-left p{font-size:14px;color:var(--text-dim);margin-top:4px;letter-spacing:-.2px;}
.clock{text-align:right;}
.clock .t{font-size:32px;font-weight:600;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.clock .d{font-size:13px;color:var(--text-dim);margin-top:2px;}

/* ── Layout map ── */
main{flex:1;padding:30px 42px 34px;display:flex;flex-direction:column;}
.legend{display:flex;gap:20px;margin-bottom:18px;font-size:13px;color:var(--text-dim);}
.legend span{display:flex;align-items:center;gap:7px;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot.f{background:var(--free);}
.dot.b{background:var(--busy);}

.grid{
  flex:1;display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1.28fr 1fr;
  gap:18px;
}
.room{
  position:relative;overflow:hidden;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px 26px;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:transform .18s ease, border-color .18s ease, background .25s ease;
  cursor:pointer;
}
.room:active{transform:scale(.985);}
.room .tag{
  font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--text-dim);
  text-transform:uppercase;
}
.room .name{
  font-size:clamp(22px, 2.6vw, 36px);font-weight:700;
  letter-spacing:-.06em;white-space:nowrap;
  overflow:hidden;text-overflow:clip;line-height:1.15;
}
.room .sub{font-size:clamp(20px,2.4vw,34px);font-weight:600;color:var(--text-dim);margin-top:5px;white-space:nowrap;letter-spacing:-.03em;}

.status{
  display:flex;align-items:center;gap:8px;
  font-size:clamp(11px,1.15vw,15px);font-weight:500;color:var(--free);
  white-space:nowrap;letter-spacing:-.03em;
}
.status .dot{flex:0 0 auto;}
.status .dot{width:9px;height:9px;}

/* busy state */
.room.busy{
  background:linear-gradient(160deg,#241417 0%, var(--surface) 60%);
  border-color:rgba(255,77,79,.35);
}
.room.busy .status{color:var(--busy);}
.busy-banner{
  position:absolute;top:0;right:0;
  background:var(--busy);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:.5px;
  padding:7px 16px;border-bottom-left-radius:14px;
}
.flight{
  font-size:20px;font-weight:600;letter-spacing:-.3px;margin-top:14px;
  display:flex;align-items:center;gap:10px;
}
.flight .chip{
  background:var(--busy-soft);color:var(--busy);
  padding:7px 16px;border-radius:10px;font-size:24px;font-weight:700;letter-spacing:.3px;
}
.timer{
  font-size:46px;font-weight:700;letter-spacing:-2px;font-variant-numeric:tabular-nums;
  line-height:1;margin-top:4px;
}
.timer small{font-size:14px;font-weight:500;color:var(--text-dim);letter-spacing:0;margin-left:8px;}
.bar{height:3px;background:var(--line);border-radius:3px;margin-top:14px;overflow:hidden;}
.bar i{display:block;height:100%;background:var(--busy);border-radius:3px;transition:width .9s linear;}

.room .reset{
  margin-top:12px;align-self:flex-start;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text-dim);
  font-size:12px;font-weight:600;padding:8px 15px;border-radius:10px;
  font-family:inherit;
}
.room .reset:active{background:#2A303C;}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;background:rgba(6,8,12,.72);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;z-index:50;
}
.overlay.on{display:flex;animation:fade .2s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{
  width:760px;max-height:82vh;background:var(--surface);
  border:1px solid var(--line);border-radius:26px;
  display:flex;flex-direction:column;overflow:hidden;
  animation:pop .22s cubic-bezier(.2,.9,.3,1.1);
}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.sheet-head{
  padding:22px 28px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;
}
.back{
  width:40px;height:40px;border-radius:12px;background:var(--surface-2);
  border:1px solid var(--line);color:var(--text);font-size:19px;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.back:active{background:#2A303C;}
.sheet-head .ti{font-size:19px;font-weight:700;letter-spacing:-.4px;}
.sheet-head .si{font-size:13px;color:var(--text-dim);margin-top:3px;}
.sheet-body{padding:22px 28px 28px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.add-flight{
  margin-top:6px;background:transparent;border:1px dashed var(--line);
  border-radius:14px;padding:15px;color:var(--text-dim);
  font-size:14px;font-weight:600;font-family:inherit;width:100%;
}
.add-flight:active{background:var(--surface-2);color:var(--text);}
.fbtn{position:relative;}
.fbtn .del{
  position:absolute;top:6px;right:8px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);font-size:16px;border-radius:6px;
}
.fbtn .del:active{background:var(--busy);color:#fff;}
.fbtn.is-custom{border-style:dashed;}
.fld{margin-bottom:16px;}
.fld label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:8px;}
.fld input{
  width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
  padding:15px 18px;color:var(--text);font-size:18px;font-family:inherit;font-weight:600;
  letter-spacing:.5px;outline:none;text-transform:uppercase;
}
.fld input:focus{border-color:var(--accent);}
.prev{font-size:13px;color:var(--accent);margin-bottom:22px;min-height:18px;}
.acts{display:flex;gap:10px;}
.acts button{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:700;font-family:inherit;border:none;}
.btn-ghost{background:var(--surface-2);color:var(--text-dim);border:1px solid var(--line)!important;}
.btn-fill{background:var(--accent);color:#fff;}
.hint{font-size:13px;color:var(--text-dim);margin-bottom:16px;}
.flights{display:flex;flex-direction:column;gap:20px;}
.sec-title{
  font-size:13px;font-weight:700;color:var(--text-dim);letter-spacing:.4px;
  margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--line);}
.sec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.charter{grid-column:1/-1;display:flex;flex-direction:column;gap:12px;}
.c-display{
  background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
  padding:16px 20px;font-size:26px;font-weight:700;letter-spacing:2px;
  min-height:62px;display:flex;align-items:center;
}
.c-display .ph{color:var(--text-dim);font-size:16px;font-weight:500;letter-spacing:0;}
.c-display .cur{
  display:inline-block;width:2px;height:26px;background:var(--accent);
  margin-left:3px;animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0}}
.kb-wrap{
  display:grid;grid-template-rows:0fr;opacity:0;
  transition:grid-template-rows .28s cubic-bezier(.2,.9,.3,1), opacity .2s ease;
  overflow:hidden;
}
.kb-wrap.on{grid-template-rows:1fr;opacity:1;}
.kb-wrap>.kb{min-height:0;overflow:hidden;}
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding-top:2px;max-width:340px;}
.c-display{cursor:pointer;}
.c-display.active{border-color:var(--accent);}
.key{
  background:var(--surface-2);border:1px solid var(--line);border-radius:11px;
  color:var(--text);font-family:inherit;font-size:19px;font-weight:600;
  height:58px;display:flex;align-items:center;justify-content:center;
}
.key.fn{font-size:14px;color:var(--text-dim);}
.c-display .pfx{color:var(--accent);margin-right:4px;}
.c-display .pfx.dim{color:var(--text-dim);opacity:.6;}
.key:active{background:#2A303C;border-color:var(--accent);}
.c-go{
  background:var(--accent);border:none;border-radius:14px;color:#fff;
  padding:16px;font-size:16px;font-weight:700;font-family:inherit;
}
.c-go:active{opacity:.8;}
.c-go:disabled{background:var(--surface-2);color:var(--text-dim);}
.fbtn{
  background:var(--surface-2);border:1px solid var(--line);border-radius:16px;
  padding:18px 16px;text-align:left;color:var(--text);font-family:inherit;
  transition:border-color .15s, background .15s;
}
.fbtn:active{background:#2A303C;border-color:var(--accent);}
.fbtn .fno{font-size:21px;font-weight:700;letter-spacing:-.3px;}
.fbtn .fdt{font-size:12px;color:var(--text-dim);margin-top:5px;}
.manual{margin-top:20px;padding-top:20px;border-top:1px solid var(--line);}
.manual label{font-size:13px;color:var(--text-dim);display:block;margin-bottom:9px;}
.mrow{display:flex;gap:10px;}
.mrow input{
  flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
  padding:15px 18px;color:var(--text);font-size:17px;font-family:inherit;font-weight:600;
  letter-spacing:.5px;outline:none;text-transform:uppercase;
}
.mrow input:focus{border-color:var(--accent);}
.mrow button{
  background:var(--accent);border:none;border-radius:14px;color:#fff;
  padding:0 26px;font-size:15px;font-weight:700;font-family:inherit;
}
.mrow button:active{opacity:.8;}
</style>
</head>

<main>

    <span><i class="dot b"></i> 이용중</span>

</main>

<div class="overlay" id="ov">
  <div class="sheet">
    <div class="sheet-head">
      <button class="back" id="back">←</button>
      <div>
        <div class="ti" id="mTitle">—</div>
        <div class="si">이용할 편명을 선택하세요</div>
      </div>
    </div>
    <div class="sheet-body">
      <div class="hint">잘못 선택한 경우 배치도에서 해당 브리핑실의 <b>사용 종료</b>를 누른 뒤 다시 선택할 수 있습니다.</div>
      <div class="flights" id="flights"></div>
    </div>
  </div>
</div>

<div class="overlay" id="addOv">
  <div class="sheet" style="width:520px">
    <div class="sheet-head">
      <div>
        <div class="ti">신규 정기편 등록</div>
        <div class="si">등록된 편명은 영구 저장되며 섹터에 자동 편입됩니다</div>
      </div>
    </div>
    <div class="sheet-body">
      <div class="fld"><label>편명</label><input id="aNo" placeholder="예) YP161 또는 161" maxlength="8"></div>
      <div class="fld"><label>도착지 (IATA 3자리)</label><input id="aDest" placeholder="예) LAX" maxlength="3"></div>
      <div class="prev" id="aPrev">도착지를 입력하면 섹터가 자동 분류됩니다</div>
      <div class="acts">
        <button class="btn-ghost" id="aCancel">취소</button>
        <button class="btn-fill" id="aSave">등록</button>
      </div>
    </div>
  </div>
</div>

<script>
const DURATION = 60*60*1000;
const ROOMS = [
  {id:'IA', name:'통합브리핑실 A'},
  {id:'IB', name:'통합브리핑실 B'},
  {id:'IC', name:'통합브리핑실 C'},
  {id:'FA', name:'운항브리핑실 A'},
  {id:'FB', name:'운항브리핑실 B'},
  {id:'FC', name:'운항브리핑실 C', sub:'(지식심사실)'},
];
const BASE_SECTORS = [
  {name:'미주 · 태평양', flights:[
    {no:'YP101', rt:'ICN → LAX'},
    {no:'YP103', rt:'ICN → LAX'},
    {no:'YP111', rt:'ICN → SFO'},
    {no:'YP113', rt:'ICN → SFO'},
    {no:'YP131', rt:'ICN → EWR'},
    {no:'YP135', rt:'ICN → IAD'},
    {no:'YP151', rt:'ICN → HNL'},
  ]},
  {name:'일본', flights:[
    {no:'YP731', rt:'ICN → NRT'},
    {no:'YP733', rt:'ICN → NRT'},
    {no:'YP735', rt:'ICN → NRT'},
  ]},
  {name:'동남아', flights:[
    {no:'YP601', rt:'ICN → BKK'},
    {no:'YP621', rt:'ICN → DAD'},
  ]},
  {name:'중국', flights:[
    {no:'YP801', rt:'ICN → HKG'},
  ]},
  {name:'부정기편', charter:true, flights:[]},
];

/* 사용자 추가 정기편 (영구 저장) */
const FKEY='briefing_flights_v1';
let custom = JSON.parse(localStorage.getItem(FKEY) || '[]');
const saveFlights=()=>localStorage.setItem(FKEY, JSON.stringify(custom));

/* 도착지 → 섹터 자동 분류 */
const SECTOR_MAP={
  LAX:'미주 · 태평양', SFO:'미주 · 태평양', EWR:'미주 · 태평양', IAD:'미주 · 태평양',
  HNL:'미주 · 태평양', JFK:'미주 · 태평양', SEA:'미주 · 태평양', YVR:'미주 · 태평양',
  NRT:'일본', HND:'일본', KIX:'일본', NGO:'일본', FUK:'일본', CTS:'일본',
  BKK:'동남아', DAD:'동남아', SGN:'동남아', HAN:'동남아', SIN:'동남아',
  MNL:'동남아', CEB:'동남아', KUL:'동남아', DPS:'동남아', CXR:'동남아',
  HKG:'중국', PVG:'중국', PEK:'중국', TPE:'중국', TAO:'중국', CAN:'중국',
};
function sectorOf(dest){ return SECTOR_MAP[dest] || '기타'; }

function buildSectors(){
  const map=new Map();
  BASE_SECTORS.forEach(s=>map.set(s.name,{name:s.name,charter:!!s.charter,flights:[...s.flights]}));
  custom.forEach(f=>{
    const sn=sectorOf(f.dest);
    if(!map.has(sn)) map.set(sn,{name:sn,charter:false,flights:[]});
    const sec=map.get(sn);
    if(!sec.flights.some(x=>x.no===f.no)) sec.flights.push({no:f.no,rt:`ICN → ${f.dest}`,custom:true});
  });
  const out=[...map.values()];
  out.forEach(sec=>sec.flights.sort((a,b)=>a.no.localeCompare(b.no,undefined,{numeric:true})));
  // 부정기편은 항상 마지막
  return out.sort((a,b)=>(a.charter?1:0)-(b.charter?1:0));
}

const KEY='briefing_state_v1';
let state = JSON.parse(localStorage.getItem(KEY) || '{}');
let target = null;
const save=()=>localStorage.setItem(KEY, JSON.stringify(state));

const grid=document.getElementById('grid');
grid.innerHTML = ROOMS.map(r=>`
  <div class="room" data-id="${r.id}">
    <div>
      <div class="name">${r.name}</div>
      ${r.sub?`<div class="sub">${r.sub}</div>`:''}
    </div>
    <div class="foot" data-foot="${r.id}"></div>
  </div>`).join('');

function pad(n){return String(n).padStart(2,'0');}

function render(){
  const now=Date.now();
  ROOMS.forEach(r=>{
    const el=grid.querySelector(`[data-id="${r.id}"]`);
    const foot=grid.querySelector(`[data-foot="${r.id}"]`);
    const s=state[r.id];
    if(s && now-s.start >= DURATION){ delete state[r.id]; save(); }
    const cur=state[r.id];
    el.querySelector('.busy-banner')?.remove();
    if(cur){
      const el2=now-cur.start;
      const m=Math.floor(el2/60000), sec=Math.floor(el2%60000/1000);
      const pct=Math.min(100, el2/DURATION*100);
      el.classList.add('busy');
      el.insertAdjacentHTML('afterbegin','<div class="busy-banner">이용중</div>');
      foot.innerHTML=`
        <div class="flight"><span class="chip">${cur.flight}</span></div>
        <div class="timer">${pad(m)}:${pad(sec)}<small>경과</small></div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <button class="reset" data-reset="${r.id}">사용 종료</button>`;
    }else{
      el.classList.remove('busy');
      foot.innerHTML=`<div class="status"><i class="dot f"></i> 사용 가능 · 터치하여 시작</div>`;
    }
  });
  const d=new Date();
  document.getElementById('clock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  document.getElementById('date').textContent=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
}

const ov=document.getElementById('ov');
const flightsEl=document.getElementById('flights');
function renderFlights(){
  flightsEl.innerHTML = buildSectors().map(sec=>`
  <div class="sector">
    <div class="sec-title">${sec.name}</div>
    <div class="sec-grid">
      ${sec.charter
        ? `<div class="charter">
             <div class="c-display" id="cIn" data-v=""><span class="pfx dim">YP</span><span class="ph">편명 숫자를 입력하세요</span></div>
             <div class="kb-wrap" id="kbWrap"><div class="kb" id="kb"></div></div>
             <button class="c-go" id="cGo">브리핑 시작</button>
           </div>`
        : sec.flights.map(f=>`<button class="fbtn${f.custom?' is-custom':''}" data-f="${f.no}">
             <div class="fno">${f.no}</div><div class="fdt">${f.rt}</div>
             ${f.custom?`<span class="del" data-del="${f.no}">×</span>`:''}
           </button>`).join('')}
    </div>
  </div>`).join('')
  + `<button class="add-flight" id="addBtn">＋ 신규 정기편 등록</button>`;
  bindCharter();
  document.getElementById('addBtn').addEventListener('click',openAdd);
}

function openSheet(id){
  target=id;
  document.getElementById('mTitle').textContent=ROOMS.find(r=>r.id===id).name;
  renderFlights();
  ov.classList.add('on');
}
function closeSheet(){ov.classList.remove('on');target=null;}
function start(flight){
  if(!target||!flight)return;
  state[target]={flight:flight.toUpperCase(),start:Date.now()};
  save();closeSheet();render();
}

grid.addEventListener('click',e=>{
  const rst=e.target.closest('[data-reset]');
  if(rst){ delete state[rst.dataset.reset]; save(); render(); return; }
  const room=e.target.closest('.room');
  if(room && !state[room.dataset.id]) openSheet(room.dataset.id);
});
document.getElementById('back').addEventListener('click',closeSheet);
ov.addEventListener('click',e=>{if(e.target===ov)closeSheet();});
flightsEl.addEventListener('click',e=>{
  const d=e.target.closest('[data-del]');
  if(d){ e.stopPropagation(); custom=custom.filter(f=>f.no!==d.dataset.del); saveFlights(); renderFlights(); return; }
  const b=e.target.closest('[data-f]'); if(b) start(b.dataset.f);
});
const KEYS='123456789'.split('').concat(['__CLR','0','__BS']);
function bindCharter(){
  const kb=document.getElementById('kb'), disp=document.getElementById('cIn'), go=document.getElementById('cGo');
  if(!kb) return;
  const LBL={'__CLR':'전체삭제','__BS':'지우기'};
  kb.innerHTML = KEYS.map(k=>`<button class="key${LBL[k]?' fn':''}" data-k="${k}">${LBL[k]||k}</button>`).join('');
  const paint=()=>{
    const v=disp.dataset.v;
    disp.innerHTML = v
      ? '<span class="pfx">YP</span>'+v+'<i class="cur"></i>'
      : '<span class="pfx dim">YP</span><span class="ph">편명 숫자를 입력하세요</span>';
    go.disabled = v.length<3;
  };
  kb.addEventListener('click',e=>{
    const b=e.target.closest('[data-k]'); if(!b)return;
    const k=b.dataset.k, v=disp.dataset.v;
    if(k==='__BS') disp.dataset.v=v.slice(0,-1);
    else if(k==='__CLR') disp.dataset.v='';
    else if(v.length<4) disp.dataset.v=v+k;
    paint();
  });
  const wrap=document.getElementById('kbWrap');
  disp.addEventListener('click',()=>{
    wrap.classList.add('on'); disp.classList.add('active');
    setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'nearest'}),300);
  });
  go.addEventListener('click',()=>start('YP'+disp.dataset.v));
  paint();
}

/* ── 신규 정기편 등록 ── */
const addOv=document.getElementById('addOv');
function openAdd(){
  document.getElementById('aNo').value='';
  document.getElementById('aDest').value='';
  document.getElementById('aPrev').textContent='도착지를 입력하면 섹터가 자동 분류됩니다';
  addOv.classList.add('on');
}
function closeAdd(){addOv.classList.remove('on');}
document.getElementById('aCancel').addEventListener('click',closeAdd);
addOv.addEventListener('click',e=>{if(e.target===addOv)closeAdd();});
document.getElementById('aDest').addEventListener('input',e=>{
  const d=e.target.value.trim().toUpperCase();
  document.getElementById('aPrev').textContent = d.length===3
    ? `자동 분류 → ${sectorOf(d)}` : '도착지를 입력하면 섹터가 자동 분류됩니다';
});
document.getElementById('aSave').addEventListener('click',()=>{
  let no=document.getElementById('aNo').value.trim().toUpperCase();
  const dest=document.getElementById('aDest').value.trim().toUpperCase();
  if(!no||dest.length!==3) return;
  if(/^\d+$/.test(no)) no='YP'+no;
  if(custom.some(f=>f.no===no)) { closeAdd(); return; }
  custom.push({no,dest}); saveFlights(); renderFlights(); closeAdd();
});


renderFlights();
render();setInterval(render,1000);
</script>
